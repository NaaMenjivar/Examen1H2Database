<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Plan Paciente</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="icon" th:href="@{/images/favico.ico}" type="image/x-icon">
</head>
<body>

<header>
    <img th:src="@{/images/header.jpg}" alt="header"/>
</header>

<div class="barra-titulo">
    <span sec:authentication="name"></span>
    <a th:href="@{/logout}">LOGOUT</a>
</div>

<div class="contenido">

    <h2 class="farmacia-titulo">
        Farmacia: <span th:text="${farmacia != null ? farmacia.nombre : ''}"></span>
    </h2>

    <form th:action="@{/plan/show}" method="get">
        <label>Paciente ID:</label>
        <input type="text" name="cedula" th:value="${cedula}"/>
        <button type="submit">Buscar</button>
        <span th:if="${cedula != null && paciente != null}" th:text="${paciente.nombre}"></span>
        <span th:if="${cedula != null && paciente == null}" style="color:red;">Paciente no encontrado</span>
    </form>

    <div th:if="${paciente != null && medicamentos != null && !medicamentos.isEmpty()}">

        <form th:action="@{/plan/registrar}" method="post">
            <input type="hidden" name="cedula" th:value="${cedula}"/>
            <label>Medicamento:</label>
            <select name="pmId">
                <option th:each="pm : ${medicamentos}"
                        th:value="${pm.id}"
                        th:text="${pm.medicamento.nombre + ' (' + pm.medicamento.plan + ' + 1) [' + pm.dosisafavor + ']'}">
                </option>
            </select>
            <label>Cant. Dosis:</label>
            <input type="number" name="cantidad" value="1" min="1"/>
            <button type="submit">Registrar</button>
        </form>

        <form th:action="@{/plan/entregar}" method="post">
            <input type="hidden" name="cedula" th:value="${cedula}"/>
            <label>Medicamento:</label>
            <select name="pmId">
                <option th:each="pm : ${medicamentos}"
                        th:value="${pm.id}"
                        th:text="${pm.medicamento.nombre + ' (' + pm.medicamento.plan + ' + 1) [' + pm.dosisafavor + ']'}">
                </option>
            </select>
            <label>Cant. Dosis:</label>
            <input type="number" name="cantidad" value="1" min="1"/>
            <button type="submit">Entregar</button>
        </form>

        <p th:if="${errorMsg != null}" style="color:red;" th:text="${errorMsg}"></p>

    </div>

</div>

<footer>Todos los derechos reservados. 2026. TotalSoft Inc. info@tsinc.com</footer>

</body>
</html>
