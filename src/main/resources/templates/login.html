<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Plan Paciente</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="icon" th:href="@{/images/favico.ico}" type="image/x-icon">
</head>
<body>

<header>
    <img th:src="@{/images/header.jpg}" alt="header"/>
</header>

<div class="barra-titulo">INGRESO</div>

<div class="login-contenedor">
    <img th:src="@{/images/login.png}" alt="login"/>

    <p th:if="${param.error}" style="color:red;">Usuario o clave incorrectos.</p>
    <p th:if="${param.logout}" style="color:green;">Sesión cerrada.</p>

    <form th:action="@{/login}" method="post">
        <div class="campo">
            <label>Id</label>
            <input type="text" name="username" required/>
        </div>
        <div class="campo">
            <label>Clave</label>
            <input type="password" name="password" required/>
        </div>
        <button type="submit">Ingresar</button>
    </form>
</div>

<footer>Todos los derechos reservados . 2026 . TotalSoft Inc. info@tsinc.com</footer>

</body>
</html>
